<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Sessões</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body class="bg-dark text-white">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="index.html">🎬 CinemaWeb</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cadastro-sessoes.html">Sessões</a></li>
                    <li class="nav-item"><a class="nav-link" href="sessoes.html">Programação</a></li>
                    <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Ingressos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h1 class="mb-4">Cadastro de Sessões</h1>
        <form id="formSessao">

            <div class="mb-3">
                <label for="filmeId" class="form-label">Filme</label>
                <select class="form-select" id="filmeId">
                    <option value="">Selecione o filme</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="salaId" class="form-label">Sala</label>
                <select class="form-select" id="salaId">
                    <option value="">Selecione a sala</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="dataHora" class="form-label">Data e Hora</label>
                <input type="datetime-local" class="form-control" id="dataHora">
            </div>

            <div class="mb-3">
                <label for="preco" class="form-label">Preço (R$)</label>
                <input type="number" class="form-control" id="preco" placeholder="Ex: 25.00" min="0" step="0.01">
            </div>

            <div class="mb-3">
                <label for="idioma" class="form-label">Idioma</label>
                <select class="form-select" id="idioma">
                    <option value="">Selecione o idioma</option>
                    <option value="Dublado">Dublado</option>
                    <option value="Legendado">Legendado</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="formato" class="form-label">Formato</label>
                <select class="form-select" id="formato">
                    <option value="">Selecione o formato</option>
                    <option value="2D">2D</option>
                    <option value="3D">3D</option>
                </select>
            </div>

            <button type="submit" class="btn btn-warning">Salvar Sessão</button>
        </form>

        <h2 class="mt-5 mb-3">Sessões Cadastradas</h2>
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Filme</th>
                    <th>Sala</th>
                    <th>Data e Hora</th>
                    <th>Preço</th>
                    <th>Idioma</th>
                    <th>Formato</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaSessoes">

            </tbody>
        </table>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/cadastro-sessoes.js"></script>
</body>
</html>
